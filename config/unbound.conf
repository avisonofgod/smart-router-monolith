# Configuración Unbound DNS para SmartRouter
# DNS Seguro con filtrado

server:
    # Interfaz y puerto
    interface: 0.0.0.0
    port: 53
    do-ip6: no
    
    # Control de acceso
    access-control: 127.0.0.1/8 allow
    access-control: 192.168.10.0/24 allow
    access-control: 192.168.20.0/24 allow
    access-control: 10.99.0.0/24 allow
    access-control: 0.0.0.0/0 deny
    
    # DNS Seguro (DNS-over-TLS)
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"
    do-tcp: yes
    
    # Forwarding a servidores DNS seguros
    forward-zone:
        name: "."
        forward-addr: 8.8.8.8@853#dns.google
        forward-addr: 1.1.1.1@853#cloudflare-dns.com
    
    # Caché
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    
    # Seguridad
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes
    edns-buffer-size: 1232
    
    # Logging
    logfile: "/var/log/unbound/unbound.log"
    verbosity: 1
    
    # Bloqueo de dominios (se carga desde blocklist.conf)
    include: /etc/unbound/blocklist.conf
    
    # Whitelist de dominios
    include: /etc/unbound/whitelist.conf

# Zonas locales
local-zone: "router.local" static
local-data: "router.local IN A 10.99.0.1"

# Bloqueo básico (ejemplos)
local-zone: "ads.example.com" static
local-zone: "tracker.example.com" static

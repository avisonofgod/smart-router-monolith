#!/usr/sbin/nft -f

# Configuración nftables para SmartRouter Monolith
# VLANs: 10=Hotspot, 20=PPPoE, 99=Gestión

flush ruleset

# Tabla para Hotspot (VLAN 10)
table inet hotspot {
    set active_clients {
        type ipv4_addr
        flags timeout
        timeout 1h
    }
    
    chain prerouting {
        type filter hook prerouting priority 0; policy accept;
        
        # Marcar tráfico de VLAN 10
        iifname "eth0.10" ip saddr @active_clients accept
        iifname "eth0.10" drop
    }
    
    chain forward {
        type filter hook forward priority 0; policy drop;
        
        # Permitir tráfico de clientes activos
        iifname "eth0.10" oifname { "eth1", "eth2" } ip saddr @active_clients accept
        
        # Aislar clientes entre sí
        iifname "eth0.10" oifname "eth0.10" drop
    }
}

# Tabla para PPPoE (VLAN 20)
table inet pppoe {
    set active_clients {
        type ipv4_addr
        flags timeout
        timeout 8h
    }
    
    chain prerouting {
        type filter hook prerouting priority 0; policy accept;
        
        # Marcar tráfico de PPPoE
        iifname "eth0.20" ip saddr @active_clients accept
    }
    
    chain forward {
        type filter hook forward priority 0; policy drop;
        
        # Permitir tráfico de clientes PPPoE autenticados
        iifname "eth0.20" oifname { "eth1", "eth2" } ip saddr @active_clients accept
        
        # Aislar clientes entre sí
        iifname "eth0.20" oifname "eth0.20" drop
    }
}

# Tabla para Gestión (VLAN 99)
table inet management {
    set whitelist {
        type ipv4_addr
        flags constant
        elements = { 10.99.0.10, 10.99.0.20, 10.99.0.30 }
    }
    
    chain input {
        type filter hook input priority 0; policy drop;
        
        # Permitir solo IPs en whitelist
        iifname "eth0.99" ip saddr @whitelist accept
        iifname "eth0.99" drop
        
        # Permitir tráfico local
        iifname "lo" accept
    }
    
    chain forward {
        type filter hook forward priority 0; policy accept;
        
        # Solo permitir salida a WAN desde VLAN 99
        iifname "eth0.99" oifname { "eth1", "eth2" } ip saddr @whitelist accept
    }
}

# Tabla para NAT y balanceo WAN
table ip nat {
    chain prerouting {
        type nat hook prerouting priority 0; policy accept;
    }
    
    chain postrouting {
        type nat hook postrouting priority 100; policy accept;
        
        # NAT para WAN1 y WAN2
        oifname "eth1" masquerade
        oifname "eth2" masquerade
    }
}

# Tabla para filtrado general
table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        
        # Permitir conexiones establecidas
        ct state established,related accept
        
        # Permitir loopback
        iifname "lo" accept
        
        # Permitir SSH en VLAN 99
        iifname "eth0.99" tcp dport 22 accept
        
        # Permitir DNS
        udp dport 53 accept
        tcp dport 53 accept
        
        # Permitir DHCP
        udp dport 67 accept
        udp dport 68 accept
    }
    
    chain forward {
        type filter hook forward priority 0; policy drop;
        
        # Permitir conexiones establecidas
        ct state established,related accept
        
        # Permitir tráfico de VLANs hacia WAN
        iifname { "eth0.10", "eth0.20", "eth0.99" } oifname { "eth1", "eth2" } accept
        
        # Denegar tráfico entre VLANs
        iifname "eth0.10" oifname "eth0.20" drop
        iifname "eth0.20" oifname "eth0.10" drop
        iifname "eth0.10" oifname "eth0.99" drop
        iifname "eth0.20" oifname "eth0.99" drop
    }
    
    chain output {
        type filter hook output priority 0; policy accept;
    }
}

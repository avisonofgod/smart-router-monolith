# Configuración accel-ppp para PPPoE
# VLAN 20 para clientes PPPoE

[modules]
log_syslog=1
pppoe=1
auth_pap=1
auth_chap=1
radius=0
ipv4_nds=1
shaper=1

[pppoe]
interface=eth0.20
vlan-mon=eth0
vlan-range=20
max-sessions=1000
sessions-per-mac=2

[auth]
# Usar Redis para autenticación (via script lua o módulo custom)
# En esta configuración usamos archivo plano temporalmente
# En producción, integrar con Redis
file=/etc/ppp/pppoe-secrets

[ppp]
# Configuración PPP
ip-up=/etc/ppp/ip-up.d/
ip-down=/etc/ppp/ip-down.d/
mtu=1480
mru=1480

[ipv4]
# Pool de IPs para clientes PPPoE
pool=192.168.20.10-192.168.20.250
mode=static
gateway=192.168.20.1
dns1=10.99.0.1
dns2=8.8.8.8

[shaper]
# Limitador de velocidad (TC)
enable=1
rate-multiplier=1
binary-multiplier=1

[log]
log-file=/var/log/accel-ppp/accel-ppp.log
log-emerg=/var/log/accel-ppp/emerg.log
log-facility=daemon
copy=1
level=3

[cli]
tcp=127.0.0.1:2001

# Integración con Redis (script personalizado)
# Cada vez que un cliente se conecta, accel-ppp ejecuta:
# /home/river/smart-router-monolith/scripts/pppoe-auth.sh %u %p
